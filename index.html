<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Window</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="video-portal" id="portal-tap-zone">
        <iframe 
            src="https://www.instagram.com/reel/DTCxPNcDCfB/embed/captioned=false" 
            scrolling="no" 
            frameborder="0" 
            allowtransparency="true" 
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
        </iframe>
    </div>

    <div id="gesture-layer"></div>

    <div id="mobile-ui" class="visible">
        <div class="bottom-sheet">
            <div class="handle"></div>
            <div class="sheet-content">
                <h3>Atmosphere Deck</h3>
                <p class="subtitle">Tap the top half of the screen to hide this menu and lock into the space.</p>
                
                <div class="scene-section">
                    <span class="section-label">Portal Status</span>
                    <div class="scene-grid">
                        <button class="scene-btn active">Instagram Feed Active</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
